services:
  - type: web
    name: nexthire-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/nexthire.db
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: nexthire-db-disk
      mountPath: /data
      sizeGB: 1
